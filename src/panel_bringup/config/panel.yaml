state_manager_node:
  ros__parameters: {}

touchscreen_hmi_node:
  ros__parameters:
    input_device_path: "/dev/input/by-path/platform-3f204000.spi-cs-1-event"
    debounce_ms: 250
    screen_width_px: 800
    screen_height_px: 480
    rotation_degrees: 0
    status_bar_height_px: 48
    center_indicator_radius_px: 64
    layout_mode: "quadrants"
    device_name: "RPI-HMI-PANEL"
    fullscreen: true

ethernet_state_server_node:
  ros__parameters:
    bind_address: "0.0.0.0"
    port: 5050
    maximum_request_size_bytes: 1024
    client_timeout_ms: 5000
    max_clients: 8
